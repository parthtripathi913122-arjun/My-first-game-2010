<!DOCTYPE html>
<html>
<head>
<title>My First Game</title>
<style>
body{
text-align:center;
background:black;
color:white;
}
#box{
width:50px;
height:50px;
background:lime;
position:absolute;
top:200px;
left:200px;
}
</style>
</head>

<body>

<h2>Tap Buttons to Move the Box</h2>

<div id="box"></div>

<br><br>

<button onclick="move('left')">Left</button>
<button onclick="move('right')">Right</button>
<button onclick="move('up')">Up</button>
<button onclick="move('down')">Down</button>

<script>
let box=document.getElementById("box");
let x=200;
let y=200;

function move(dir){
if(dir=="left") x-=20;
if(dir=="right") x+=20;
if(dir=="up") y-=20;
if(dir=="down") y+=20;

box.style.left=x+"px";
box.style.top=y+"px";
}
</script>

</body>
</html>
